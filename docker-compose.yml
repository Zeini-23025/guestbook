version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: mydatabase
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data: