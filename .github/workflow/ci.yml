name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      # ---------------------------
      # Backend
      # ---------------------------
      - name: Install Server
        run: |
          cd server
          npm install

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for Postgres..."
            sleep 1
          done

      - name: Run Server
        env:
          POSTGRES_URI: postgres://user:password@localhost:5432/testdb
        run: |
          cd server
          nohup node index.js &
          sleep 5

      - name: Test Server
        run: |
          cd server
          npm test || echo "No tests defined for backend"

      # ---------------------------
      # Frontend
      # ---------------------------
      - name: Install Client
        run: |
          cd client
          npm install

      - name: Build Client
        run: |
          cd client
          npm run build

      - name: Test Client
        run: |
          cd client
          npm test || echo "No tests defined for frontend"